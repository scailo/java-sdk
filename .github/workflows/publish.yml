name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Sign Artifacts
        run: ./gradlew :lib:publishMavenJavaPublicationToMavenLocal
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create Bundle ZIP
        run: |
          cd ~/.m2/repository/com/scailo/scailo-sdk/${{ github.ref_name }}
          # Remove 'v' from tag name for the path if your versioning logic does so
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          cd ~/.m2/repository/com/scailo/scailo-sdk/$VERSION
          zip -r ../../../../bundle.zip .

      - name: Upload to Central Portal
        run: |
          curl --request POST \
            --header "Authorization: Bearer ${{ secrets.CENTRAL_TOKEN }}" \
            --form "bundle=@bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/deployments"