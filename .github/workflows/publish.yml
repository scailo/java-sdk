name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Sign
        run: |
          ./gradlew publishMavenJavaPublicationToMavenLocal \
            -Psigning.signingKey="${{ secrets.GPG_PRIVATE_KEY }}" \
            -Psigning.password="${{ secrets.GPG_PASSPHRASE }}"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create Bundle ZIP
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          
          # 1. Navigate to the ROOT of the local maven repository
          cd $HOME/.m2/repository
          
          # 2. Target the specific version folder
          TARGET_DIR="com/scailo/scailo-sdk/$VERSION"
          
          # 3. Generate missing MD5 and SHA1 checksums
          # This loops through every file in the version folder and creates the .md5 and .sha1
          find "$TARGET_DIR" -type f -not -name "*.md5" -not -name "*.sha1" | while read -r file; do
            md5sum "$file" | cut -d ' ' -f 1 > "${file}.md5"
            sha1sum "$file" | cut -d ' ' -f 1 > "${file}.sha1"
          done
          
          # 4. Create the ZIP including the directory structure
          # It is CRITICAL to zip 'com/...' and not just the files inside.
          zip -r "$GITHUB_WORKSPACE/bundle.zip" com/scailo/scailo-sdk/$VERSION
          
          echo "Bundle created with checksums and correct path structure."

      - name: Upload to Central Portal
        run: |
          AUTH=$(echo -n "${{ secrets.CENTRAL_USERNAME }}:${{ secrets.CENTRAL_PASSWORD }}" | base64)
          
          curl --request POST \
            --verbose \
            --header "Authorization: Bearer $AUTH" \
            --form "bundle=@$GITHUB_WORKSPACE/bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC"