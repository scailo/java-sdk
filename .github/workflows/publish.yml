name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0, v2.1.0, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish to Maven Central
        run: |
          # Decode the secret back into a temporary file
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d > gpg_key.asc
          
          ./gradlew :lib:publishAllPublicationsToMavenCentralRepository \
            -PsigningInMemoryKey="$(cat gpg_key.asc)" \
            -PsigningPassword="${{ secrets.GPG_PASSPHRASE }}" \
            -PmavenCentralUsername="${{ secrets.CENTRAL_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.CENTRAL_PASSWORD }}"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}